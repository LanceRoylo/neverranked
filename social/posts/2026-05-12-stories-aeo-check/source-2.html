<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NR Story 2 - Confession + mechanism</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Mono:ital,wght@0,300;0,400;0,500;0,600&family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<style>
:root{
  --gold:#c9a84c;
  --gold-bright:#e8c767;
  --bg:#0a0908;
  --text:#fbf8ef;
  --text-mute:#a8a298;
  --text-faint:#6b665a;
  --serif:"Playfair Display",Georgia,serif;
  --label:"Barlow Condensed","Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:1080px;height:1920px;overflow:hidden;
  background:var(--bg);color:var(--text);
}
.story{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  padding:280px 80px 280px;
  position:relative;
  background:radial-gradient(ellipse at 30% 70%, #1d1813 0%, #0a0908 60%);
}
.brand-mark{
  font-family:var(--serif);font-style:italic;font-size:34px;color:var(--gold);
  position:absolute;top:280px;left:80px;
}
.center-block{
  display:flex;flex-direction:column;align-items:flex-start;justify-content:center;
  flex:1;text-align:left;
}
.line-a{
  font-family:var(--serif);font-weight:400;font-style:italic;
  font-size:54px;line-height:1.25;letter-spacing:-0.015em;
  color:var(--gold-bright);margin-bottom:64px;
}
.line-b{
  font-family:var(--serif);font-weight:400;
  font-size:50px;line-height:1.3;letter-spacing:-0.02em;
  color:var(--text);margin-bottom:48px;
}
.line-b em{font-style:italic;color:var(--gold-bright)}
.divider{
  width:160px;height:2px;background:var(--gold);
  margin-bottom:48px;
}
.line-c{
  font-family:var(--serif);font-weight:400;font-style:italic;
  font-size:48px;line-height:1.3;letter-spacing:-0.015em;
  color:var(--text-mute);
}
.bottom-prompt{
  position:absolute;bottom:280px;left:0;right:0;
  text-align:center;
  font-family:var(--label);text-transform:uppercase;letter-spacing:0.4em;
  font-size:18px;color:var(--text-faint);font-weight:500;
}
</style>
</head>
<body>
<div class="story">

  <div class="brand-mark">Never Ranked</div>

  <div class="center-block">
    <div class="line-a">Most marketers haven't heard the word.</div>
    <div class="line-b">
      Schema is a small block of code that tells AI engines what a page <em>is actually about.</em>
    </div>
    <div class="divider"></div>
    <div class="line-c">Engines that guess pick someone else.</div>
  </div>

  <div class="bottom-prompt">Card 2 of 4</div>

</div>
</body>
</html>
