<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NR Story 3 - Five schema types</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Mono:ital,wght@0,300;0,400;0,500;0,600&family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<style>
:root{
  --gold:#c9a84c;
  --gold-bright:#e8c767;
  --bg:#0a0908;
  --text:#fbf8ef;
  --text-mute:#a8a298;
  --text-faint:#6b665a;
  --line:#2a2620;
  --serif:"Playfair Display",Georgia,serif;
  --mono:"DM Mono","Menlo",monospace;
  --label:"Barlow Condensed","Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:1080px;height:1920px;overflow:hidden;
  background:var(--bg);color:var(--text);
}
.story{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  padding:280px 80px 280px;
  position:relative;
  background:radial-gradient(ellipse at 50% 50%, #1d1813 0%, #0a0908 70%);
}
.brand-mark{
  font-family:var(--serif);font-style:italic;font-size:34px;color:var(--gold);
  position:absolute;top:280px;left:80px;
}
.eyebrow{
  font-family:var(--label);text-transform:uppercase;letter-spacing:0.28em;
  font-size:18px;color:var(--gold);font-weight:700;
  text-align:center;margin-top:40px;margin-bottom:72px;
  display:flex;align-items:center;justify-content:center;gap:14px;
}
.eyebrow .dot{
  width:8px;height:8px;background:var(--gold);border-radius:50%;
  box-shadow:0 0 14px rgba(232,199,103,.5);
}

.list{
  flex:1;display:flex;flex-direction:column;justify-content:center;
  gap:32px;padding-left:40px;
}
.item{
  display:flex;align-items:baseline;gap:34px;
}
.num{
  font-family:var(--serif);font-style:italic;font-weight:400;
  font-size:88px;line-height:1;color:var(--gold-bright);
  min-width:90px;text-align:right;
}
.label{
  font-family:var(--serif);font-weight:400;
  font-size:72px;line-height:1;letter-spacing:-0.02em;
  color:var(--text);
}

.footnote{
  position:absolute;bottom:340px;left:0;right:0;
  text-align:center;padding:0 80px;
  font-family:var(--label);text-transform:uppercase;letter-spacing:0.36em;
  font-size:18px;color:var(--text-mute);font-weight:500;line-height:1.7;
}
.footnote em{color:var(--gold);font-style:normal;font-weight:700}

.bottom-prompt{
  position:absolute;bottom:280px;left:0;right:0;
  text-align:center;
  font-family:var(--label);text-transform:uppercase;letter-spacing:0.4em;
  font-size:18px;color:var(--text-faint);font-weight:500;
}
</style>
</head>
<body>
<div class="story">

  <div class="brand-mark">Never Ranked</div>

  <div class="eyebrow">
    <div class="dot"></div>
    <span>5 schema types you probably don't have</span>
  </div>

  <div class="list">
    <div class="item"><div class="num">1.</div><div class="label">FAQPage</div></div>
    <div class="item"><div class="num">2.</div><div class="label">BreadcrumbList</div></div>
    <div class="item"><div class="num">3.</div><div class="label">Article</div></div>
    <div class="item"><div class="num">4.</div><div class="label">Event</div></div>
    <div class="item"><div class="num">5.</div><div class="label">AggregateRating</div></div>
  </div>

  <div class="footnote">
    <em>None cost money.</em><br>
    All are invisible to users.
  </div>

  <div class="bottom-prompt">Card 3 of 4 &middot; screenshot this</div>

</div>
</body>
</html>
