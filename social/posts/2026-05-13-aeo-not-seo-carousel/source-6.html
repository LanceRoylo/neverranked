<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NR Carousel Slide 6 - CTA</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Mono:ital,wght@0,300;0,400;0,500;0,600&family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<style>
:root{
  --gold:#c9a84c;
  --gold-bright:#e8c767;
  --bg:#0a0908;
  --text:#fbf8ef;
  --text-mute:#a8a298;
  --text-faint:#6b665a;
  --line:#2a2620;
  --term-bg:#0d0c0a;
  --serif:"Playfair Display",Georgia,serif;
  --mono:"DM Mono","Menlo",monospace;
  --label:"Barlow Condensed","Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:1080px;height:1350px;overflow:hidden;
  background:var(--bg);color:var(--text);
}
.card{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  padding:80px 80px 64px;
  position:relative;
  background:radial-gradient(ellipse at 50% 50%, #251c12 0%, #0a0908 60%);
}

.brand-row{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:auto;
}
.brand-mark{font-family:var(--serif);font-style:italic;font-size:28px;color:var(--gold)}
.brand-tag{
  font-family:var(--label);text-transform:uppercase;letter-spacing:0.34em;
  font-size:12px;color:var(--text-faint);font-weight:500;
}

.eyebrow{
  position:absolute;top:240px;left:0;right:0;
  font-family:var(--label);text-transform:uppercase;letter-spacing:0.42em;
  font-size:20px;color:var(--gold);font-weight:700;text-align:center;
}

.center-block{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex:1;text-align:center;gap:46px;
}

.headline{
  font-family:var(--serif);font-weight:400;font-style:italic;
  font-size:100px;line-height:1.02;letter-spacing:-0.025em;
  color:var(--gold-bright);
}

.url-block{
  display:inline-flex;align-items:center;gap:18px;
  background:var(--term-bg);border:1px solid var(--line);
  padding:24px 36px;border-radius:12px;
  box-shadow:0 20px 50px rgba(0,0,0,.7);
}
.url-prompt{font-family:var(--mono);font-size:22px;color:var(--gold);font-weight:500}
.url-text{font-family:var(--mono);font-size:26px;color:var(--text);font-weight:500;letter-spacing:0.01em}

.subtext{
  font-family:var(--serif);font-style:italic;font-weight:400;
  font-size:28px;line-height:1.4;color:var(--text-mute);
}
.subtext em{color:var(--gold-bright);font-style:italic}

.bottom-row{
  margin-top:auto;
  display:flex;align-items:center;justify-content:space-between;
  padding-top:36px;border-top:1px solid var(--line);
}
.bottom-left{
  font-family:var(--label);text-transform:uppercase;letter-spacing:0.32em;
  font-size:12px;color:var(--text-faint);font-weight:500;
}
.bottom-right{
  font-family:var(--mono);font-size:12px;color:var(--gold);font-weight:500;
  letter-spacing:0.06em;
}
</style>
</head>
<body>
<div class="card">

  <div class="brand-row">
    <div class="brand-mark">Never Ranked</div>
    <div class="brand-tag">Carousel &middot; May 2026</div>
  </div>

  <div class="eyebrow">Free check &middot; no signup</div>

  <div class="center-block">
    <div class="headline">What's your<br>AEO score?</div>

    <div class="url-block">
      <span class="url-prompt">$</span>
      <span class="url-text">check.neverranked.com</span>
    </div>

    <div class="subtext">
      30 seconds. No card.<br>
      <em>Drop a domain in the comments. I'll run it.</em>
    </div>
  </div>

  <div class="bottom-row">
    <div class="bottom-left">ChatGPT &middot; Perplexity &middot; Claude &middot; Gemini &middot; Copilot &middot; AIO &middot; Gemma</div>
    <div class="bottom-right">6 / 6 &middot; 1 open-weight</div>
  </div>

</div>
</body>
</html>
