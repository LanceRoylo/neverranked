<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NR Carousel — Slide 1 Hook</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Mono:ital,wght@0,300;0,400;0,500;0,600&family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<style>
:root{
  --gold:#c9a84c;--gold-bright:#e8c767;--bg:#0a0908;--text:#fbf8ef;
  --text-mute:#a8a298;--text-faint:#6b665a;--line:#2a2620;
  --serif:"Playfair Display",Georgia,serif;--mono:"DM Mono","Menlo",monospace;
  --label:"Barlow Condensed","Helvetica Neue",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1080px;height:1350px;overflow:hidden;background:var(--bg);color:var(--text);-webkit-print-color-adjust:exact;print-color-adjust:exact}
.card{width:100%;height:100%;display:flex;flex-direction:column;padding:80px 80px 64px;position:relative;background:radial-gradient(ellipse at 50% 28%, #1d1813 0%, #0a0908 70%)}
.brand-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:auto}
.brand-mark{font-family:var(--serif);font-style:italic;font-size:28px;color:var(--gold)}
.brand-tag{font-family:var(--label);text-transform:uppercase;letter-spacing:0.34em;font-size:12px;color:var(--text-faint);font-weight:500}
.center-block{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:0 10px}
.headline{font-family:var(--serif);font-weight:400;font-size:104px;line-height:1.04;letter-spacing:-0.03em;color:var(--text);margin-bottom:44px}
.headline em{font-style:italic;color:var(--gold-bright)}
.subhead{font-family:var(--label);font-size:30px;letter-spacing:0.02em;color:var(--text-mute);font-weight:400;max-width:760px;margin-bottom:60px}
.swipe-prompt{font-family:var(--label);text-transform:uppercase;letter-spacing:0.42em;font-size:20px;color:var(--gold);font-weight:700;display:inline-flex;align-items:center;gap:14px}
.swipe-prompt .arrow{font-family:var(--serif);font-size:32px;letter-spacing:0;line-height:1}
.bottom-row{margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:40px;border-top:1px solid var(--line)}
.bottom-left{font-family:var(--label);text-transform:uppercase;letter-spacing:0.32em;font-size:12px;color:var(--text-faint);font-weight:500}
.bottom-right{font-family:var(--mono);font-size:13px;color:var(--gold);font-weight:500;letter-spacing:0.08em}
</style>
</head>
<body>
<div class="card">
  <div class="brand-row">
    <div class="brand-mark">Never Ranked</div>
    <div class="brand-tag">Carousel · May 2026</div>
  </div>
  <div class="center-block">
    <div class="headline">You can be <em>#1 on Google</em><br>and still not exist.</div>
    <div class="subhead">Here is what actually decides who the AI recommends.</div>
    <div class="swipe-prompt"><span>swipe</span><span class="arrow">&rarr;</span></div>
  </div>
  <div class="bottom-row">
    <div class="bottom-left">SEO is the old game</div>
    <div class="bottom-right">1 / 9</div>
  </div>
</div>
</body>
</html>
