<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NR Carousel — Slide 5 AEO answer</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Mono:ital,wght@0,300;0,400;0,500;0,600&family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<style>
:root{--gold:#c9a84c;--gold-bright:#e8c767;--bg:#0a0908;--text:#fbf8ef;--text-mute:#a8a298;--text-faint:#6b665a;--line:#2a2620;--serif:"Playfair Display",Georgia,serif;--mono:"DM Mono","Menlo",monospace;--label:"Barlow Condensed","Helvetica Neue",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1080px;height:1350px;overflow:hidden;background:var(--bg);color:var(--text);-webkit-print-color-adjust:exact;print-color-adjust:exact}
.card{width:100%;height:100%;display:flex;flex-direction:column;padding:80px 80px 64px;position:relative;background:radial-gradient(ellipse at 50% 42%, #221a10 0%, #0a0908 70%)}
.brand-row{display:flex;align-items:center;justify-content:space-between}
.brand-mark{font-family:var(--serif);font-style:italic;font-size:28px;color:var(--gold)}
.brand-tag{font-family:var(--label);text-transform:uppercase;letter-spacing:0.34em;font-size:12px;color:var(--text-faint);font-weight:500}
.stack{display:flex;flex-direction:column;justify-content:center;flex:1}
.kicker{font-family:var(--label);text-transform:uppercase;letter-spacing:0.4em;font-size:24px;color:var(--gold);font-weight:600;margin:0 0 16px}
.title{font-family:var(--serif);font-weight:400;font-size:82px;line-height:1;letter-spacing:-0.02em;margin-bottom:54px}
.title em{font-style:italic;color:var(--gold-bright)}
.ghosts{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;opacity:.28}
.ghost{height:10px;border-radius:3px;background:#3a352c}
.ghost:nth-child(2){width:88%}.ghost:nth-child(3){width:74%}
.answer{border:1px solid rgba(201,168,76,0.55);background:linear-gradient(180deg, rgba(201,168,76,0.12), rgba(201,168,76,0.03));border-radius:10px;padding:46px 44px;display:flex;flex-direction:column;gap:14px}
.answer-label{font-family:var(--mono);font-size:18px;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase}
.answer-text{font-family:var(--serif);font-size:46px;line-height:1.18;color:var(--text)}
.answer-text b{color:var(--gold-bright);font-weight:600;font-style:italic}
.caption{font-family:var(--label);font-size:32px;color:var(--text-mute);margin-top:44px;line-height:1.34}
.caption b{color:var(--text);font-weight:600}
.bottom-row{margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:34px;border-top:1px solid var(--line)}
.bottom-left{font-family:var(--label);text-transform:uppercase;letter-spacing:0.32em;font-size:12px;color:var(--text-faint);font-weight:500}
.bottom-right{font-family:var(--mono);font-size:13px;color:var(--gold);font-weight:500;letter-spacing:0.08em}
</style>
</head>
<body>
<div class="card">
  <div class="brand-row"><div class="brand-mark">Never Ranked</div><div class="brand-tag">Carousel · May 2026</div></div>
  <div class="stack">
    <div class="kicker">The new game</div>
    <div class="title">AEO: there is no <em>list.</em></div>
    <div class="ghosts"><div class="ghost"></div><div class="ghost"></div><div class="ghost"></div></div>
    <div class="answer">
      <div class="answer-label">AI answer</div>
      <div class="answer-text">"The one I would recommend is <b>[one company].</b>"</div>
    </div>
    <div class="caption">No number four. No second page. <b>You are the answer, or you are not in it.</b></div>
  </div>
  <div class="bottom-row"><div class="bottom-left">One answer wins</div><div class="bottom-right">5 / 9</div></div>
</div>
</body>
</html>
