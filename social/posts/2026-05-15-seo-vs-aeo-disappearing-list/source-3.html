<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NR Carousel — Slide 3 SEO list</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Mono:ital,wght@0,300;0,400;0,500;0,600&family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<style>
:root{--gold:#c9a84c;--gold-bright:#e8c767;--bg:#0a0908;--text:#fbf8ef;--text-mute:#a8a298;--text-faint:#6b665a;--line:#2a2620;--serif:"Playfair Display",Georgia,serif;--mono:"DM Mono","Menlo",monospace;--label:"Barlow Condensed","Helvetica Neue",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1080px;height:1350px;overflow:hidden;background:var(--bg);color:var(--text);-webkit-print-color-adjust:exact;print-color-adjust:exact}
.card{width:100%;height:100%;display:flex;flex-direction:column;padding:80px 80px 64px;position:relative;background:radial-gradient(ellipse at 50% 24%, #1a1611 0%, #0a0908 72%)}
.brand-row{display:flex;align-items:center;justify-content:space-between}
.brand-mark{font-family:var(--serif);font-style:italic;font-size:28px;color:var(--gold)}
.brand-tag{font-family:var(--label);text-transform:uppercase;letter-spacing:0.34em;font-size:12px;color:var(--text-faint);font-weight:500}
.kicker{font-family:var(--label);text-transform:uppercase;letter-spacing:0.4em;font-size:24px;color:var(--text-faint);font-weight:600;margin:64px 0 14px}
.title{font-family:var(--serif);font-weight:400;font-size:82px;line-height:1;letter-spacing:-0.02em;margin-bottom:48px}
.title em{font-style:italic;color:var(--gold-bright)}
.list{display:flex;flex-direction:column;gap:13px;flex:1}
.row{display:flex;align-items:center;gap:22px;background:rgba(255,255,255,0.025);border:1px solid var(--line);border-radius:6px;padding:18px 26px}
.rank{font-family:var(--mono);font-size:24px;color:var(--text-faint);width:54px;font-weight:500}
.bar{height:14px;border-radius:3px;background:#3a352c;flex:1}
.row:nth-child(1) .bar{width:100%}.row:nth-child(2) .bar{opacity:.9}.row:nth-child(3) .bar{opacity:.78}
.row:nth-child(n+4) .bar{opacity:.6}.row:nth-child(n+7) .bar{opacity:.42}
.caption{font-family:var(--label);font-size:30px;color:var(--text-mute);margin-top:40px;line-height:1.35}
.caption b{color:var(--text);font-weight:600}
.bottom-row{margin-top:36px;display:flex;align-items:center;justify-content:space-between;padding-top:34px;border-top:1px solid var(--line)}
.bottom-left{font-family:var(--label);text-transform:uppercase;letter-spacing:0.32em;font-size:12px;color:var(--text-faint);font-weight:500}
.bottom-right{font-family:var(--mono);font-size:13px;color:var(--gold);font-weight:500;letter-spacing:0.08em}
</style>
</head>
<body>
<div class="card">
  <div class="brand-row"><div class="brand-mark">Never Ranked</div><div class="brand-tag">Carousel · May 2026</div></div>
  <div class="kicker">The old game</div>
  <div class="title">SEO: you fight for <em>a slot.</em></div>
  <div class="list">
    <div class="row"><span class="rank">01</span><span class="bar"></span></div>
    <div class="row"><span class="rank">02</span><span class="bar"></span></div>
    <div class="row"><span class="rank">03</span><span class="bar"></span></div>
    <div class="row"><span class="rank">04</span><span class="bar"></span></div>
    <div class="row"><span class="rank">05</span><span class="bar"></span></div>
    <div class="row"><span class="rank">06</span><span class="bar"></span></div>
    <div class="row"><span class="rank">07</span><span class="bar"></span></div>
    <div class="row"><span class="rank">08</span><span class="bar"></span></div>
    <div class="row"><span class="rank">09</span><span class="bar"></span></div>
    <div class="row"><span class="rank">10</span><span class="bar"></span></div>
  </div>
  <div class="caption">Ten blue links. The searcher picks from a list. <b>Being number four still gets clicks.</b></div>
  <div class="bottom-row"><div class="bottom-left">A list of options</div><div class="bottom-right">3 / 9</div></div>
</div>
</body>
</html>
