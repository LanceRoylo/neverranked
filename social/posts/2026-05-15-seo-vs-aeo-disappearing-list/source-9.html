<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NR Carousel — Slide 9 close</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=DM+Mono:ital,wght@0,300;0,400;0,500;0,600&family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<style>
:root{--gold:#c9a84c;--gold-bright:#e8c767;--bg:#0a0908;--text:#fbf8ef;--text-mute:#a8a298;--text-faint:#6b665a;--line:#2a2620;--serif:"Playfair Display",Georgia,serif;--mono:"DM Mono","Menlo",monospace;--label:"Barlow Condensed","Helvetica Neue",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:1080px;height:1350px;overflow:hidden;background:var(--bg);color:var(--text);-webkit-print-color-adjust:exact;print-color-adjust:exact}
.card{width:100%;height:100%;display:flex;flex-direction:column;padding:80px 80px 70px;position:relative;background:radial-gradient(ellipse at 50% 40%, #221a10 0%, #0a0908 72%)}
.brand-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:auto}
.brand-mark{font-family:var(--serif);font-style:italic;font-size:28px;color:var(--gold)}
.brand-tag{font-family:var(--label);text-transform:uppercase;letter-spacing:0.34em;font-size:12px;color:var(--text-faint);font-weight:500}
.center-block{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:0 6px}
.wordmark{font-family:var(--serif);font-style:italic;font-size:72px;color:var(--gold);margin-bottom:34px}
.headline{font-family:var(--serif);font-weight:400;font-size:64px;line-height:1.12;letter-spacing:-0.02em;margin-bottom:30px}
.headline em{font-style:italic;color:var(--gold-bright)}
.url{font-family:var(--mono);font-size:30px;color:var(--text);letter-spacing:0.06em;padding:18px 38px;border:1px solid rgba(201,168,76,0.5);border-radius:8px;margin-bottom:48px}
.share{font-family:var(--label);font-size:30px;color:var(--text-mute);line-height:1.35;max-width:760px}
.share b{color:var(--text);font-weight:600}
.bottom-row{margin-top:auto;display:flex;align-items:center;justify-content:space-between;padding-top:40px;border-top:1px solid var(--line)}
.bottom-left{font-family:var(--label);text-transform:uppercase;letter-spacing:0.32em;font-size:12px;color:var(--text-faint);font-weight:500}
.bottom-right{font-family:var(--mono);font-size:13px;color:var(--gold);font-weight:500;letter-spacing:0.08em}
</style>
</head>
<body>
<div class="card">
  <div class="brand-row"><div class="brand-mark">Never Ranked</div><div class="brand-tag">Carousel · May 2026</div></div>
  <div class="center-block">
    <div class="wordmark">Never Ranked</div>
    <div class="headline">Find out if AI names you<br>or names your <em>competitor.</em></div>
    <div class="url">neverranked.com</div>
    <div class="share">Send this to whoever owns your marketing <b>before they find out the hard way.</b></div>
  </div>
  <div class="bottom-row"><div class="bottom-left">Answer Engine Optimization</div><div class="bottom-right">9 / 9</div></div>
</div>
</body>
</html>
