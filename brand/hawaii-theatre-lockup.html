<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Barlow+Condensed:wght@500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  width:1200px;height:1200px;
  background:#0a0908;
  color:#fbf8ef;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
body::before{
  content:"";
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 30%, #0b2a2c 0%, #0a0908 70%);
}
.stack{
  position:relative;z-index:2;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
  max-width:900px;
}

.tag-top{
  font-family:'Barlow Condensed',Helvetica,sans-serif;
  text-transform:uppercase;
  letter-spacing:.34em;
  font-size:22px;
  color:#74CBC8;
  font-weight:500;
  margin-bottom:48px;
}

/* Hawaii Theatre name set in Neutra fallback stack per HTC Style Guide */
.name {
  font-family:"Futura PT",Futura,"Avenir Next",Avenir,"Helvetica Neue",sans-serif;
  font-weight:700;
  font-style:normal;
  font-size:128px;
  line-height:.95;
  letter-spacing:-.01em;
  text-transform:uppercase;
  color:#fbf8ef;
  margin-bottom:18px;
}
.name em{
  font-style:normal;
  color:#74CBC8;
}

.divider{
  width:280px;height:2px;
  background:linear-gradient(90deg,transparent,#006A71,transparent);
  margin:38px 0;
}

.descriptor{
  font-family:'Playfair Display',Georgia,serif;
  font-style:italic;
  font-weight:400;
  font-size:32px;
  line-height:1.35;
  color:rgba(251,248,239,.82);
  margin-bottom:14px;
  max-width:720px;
}

.tag-bottom{
  font-family:'Barlow Condensed',Helvetica,sans-serif;
  text-transform:uppercase;
  letter-spacing:.32em;
  font-size:18px;
  color:rgba(232,199,103,.78);
  font-weight:500;
  margin-top:14px;
}
</style>
</head>
<body>
<div class="stack">
  <div class="tag-top">Case Study · Honolulu</div>
  <h1 class="name">Hawaii <em>Theatre</em></h1>
  <div class="divider"></div>
  <p class="descriptor">A historic performing arts venue. Open since 1922. 80,000-100,000 patrons a year.</p>
  <div class="tag-bottom">NeverRanked · 45 to 95 in Ten Days</div>
</div>
</body>
</html>
