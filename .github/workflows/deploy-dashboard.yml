name: Deploy dashboard worker to Cloudflare

# Auto-deploys the dashboard Cloudflare Worker on push to main.
# Three steps run in order: type-check (via wrangler dry-run),
# apply pending D1 migrations, then deploy the worker.
#
# Manual deploys via `cd dashboard && npm run deploy` still work but
# should not be needed under normal operation. The whole point of
# this workflow is removing that step from Lance's hands.
#
# Setup required (one-time):
#   - GitHub repo Settings → Secrets and variables → Actions
#   - Add CLOUDFLARE_API_TOKEN with Workers Scripts:Edit + D1:Edit perms
#     for account 'lanceroylo'. Same token used by the marketing
#     deploy.yml — if that workflow already runs, the token already
#     exists; this one reuses it.
#
# Path filter is intentional: only fires on dashboard/** changes so
# pure marketing-only commits don't trigger a dashboard redeploy.

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build check (wrangler dry-run)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --dry-run --outdir=/tmp/build-check

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply neverranked-app --remote

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy
