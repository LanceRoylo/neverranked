name: Deploy dashboard worker to Cloudflare

# Auto-deploys the dashboard Cloudflare Worker on push to main.
# Three steps run in order: type-check (via wrangler dry-run),
# apply pending D1 migrations, then deploy the worker.
#
# Manual deploys via `cd dashboard && npm run deploy` still work but
# should not be needed under normal operation. The whole point of
# this workflow is removing that step from Lance's hands.
#
# Setup required (one-time):
#   - GitHub repo Settings → Secrets and variables → Actions
#   - Add CLOUDFLARE_API_TOKEN with Workers Scripts:Edit + D1:Edit perms
#     for account 'lanceroylo'. Same token used by the marketing
#     deploy.yml — if that workflow already runs, the token already
#     exists; this one reuses it.
#
# Path filter is intentional: only fires on dashboard/** changes so
# pure marketing-only commits don't trigger a dashboard redeploy.

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # issues: write so the failure step below can raise a loud,
    # deduped alert. A silent red run is what hid a weeks-long prod
    # outage; this makes failure impossible to miss.
    permissions:
      contents: read
      issues: write
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build check (wrangler dry-run)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --dry-run --outdir=/tmp/build-check

      - name: Apply D1 migrations (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 migrations apply neverranked-app --remote

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy

      # Loud failure. Without this a failed deploy is silent -- the
      # site keeps serving the last good version, nothing pages
      # anyone, and the gap between main and prod hides for weeks
      # (exactly what happened). On any failed step, open or update a
      # single rolling issue so it surfaces where it's seen.
      - name: Alert on deploy failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "🚨 Dashboard deploy is failing";
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `\`deploy-dashboard.yml\` failed on \`${context.sha.slice(0,7)}\` (${new Date().toISOString()}).\n\n`
              + `Production is **not** receiving updates until this is green again.\n\n`
              + `Failed run: ${run}\n\n`
              + `_Auto-filed by the deploy workflow. Close this once a deploy run is green._`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "deploy-failure", per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["deploy-failure"],
              });
            }
