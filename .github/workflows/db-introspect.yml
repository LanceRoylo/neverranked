name: DB introspect (read-only)

# Manually-triggered, READ-ONLY diagnostic for the production D1.
# Exists to debug the migration-ledger drift that has been failing
# deploy-dashboard.yml on every run. Runs only SELECTs -- it cannot
# modify the database. Does NOT deploy anything.
#
# Trigger: Actions tab -> "DB introspect (read-only)" -> Run workflow.

on:
  workflow_dispatch:

jobs:
  introspect:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - name: Applied-migration ledger (d1_migrations)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute neverranked-app --remote --json --command "SELECT name FROM d1_migrations ORDER BY id;"

      - name: Tables that actually exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute neverranked-app --remote --json --command "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name;"

      - name: Indexes that actually exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute neverranked-app --remote --json --command "SELECT name FROM sqlite_master WHERE type='index' AND name NOT LIKE 'sqlite_%' ORDER BY name;"

      - name: Does the meta_descriptions table exist yet?
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler d1 execute neverranked-app --remote --json --command "SELECT name FROM sqlite_master WHERE type='table' AND name='meta_descriptions';"
