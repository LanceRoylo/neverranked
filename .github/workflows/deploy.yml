name: Deploy homepage to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - '404.html'
      - 'og.png'
      - 'og.jpg'
      - 'og-source.html'
      - 'favicon.ico'
      - 'favicon.png'
      - 'robots.txt'
      - 'sitemap.xml'
      - 'llms.txt'
      - 'citation-demo.mp4'
      - '_headers'
      - '_redirects'
      - '.well-known/**'
      - 'about/**'
      - 'agencies/**'
      - 'blog/**'
      - 'case-studies/**'
      - 'example-engagement/**'
      - 'first-30-days/**'
      - 'for-agencies/**'
      - 'kit/**'
      - 'methodology/**'
      - 'pitch/**'
      - 'principles/**'
      - 'privacy/**'
      - 'profile/**'
      - 'retraction/**'
      - 'schemas/**'
      - 'security/**'
      - 'standards/**'
      - 'state-of-aeo/**'
      - 'takedowns/**'
      - 'teardowns/**'
      - 'terms/**'
      - 'thanks/**'
      - 'vs/**'
      - 'your-clicks-are-down/**'
      - 'hawaii-bank-aeo/**'
      - 'hawaii-wealth-aeo/**'
      - 'honolulu-dental-aeo/**'
      - 'hawaii-law-aeo/**'
      - 'dashboard-preview/**'
      - 'wrangler.jsonc'
      - 'scripts/build.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build dist/
        run: bash scripts/build.sh

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4 deploy
