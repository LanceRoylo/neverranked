name: Deploy homepage to Cloudflare

on:
  push:
    branches: [main]
    paths:
      # Root files — keep in sync with FILES in scripts/build.sh
      - 'index.html'
      - '404.html'
      - 'og.jpg'
      - 'og-source.html'
      - 'favicon.ico'
      - 'favicon.png'
      - 'robots.txt'
      - 'llms.txt'
      - 'citation-demo.mp4'
      - '_headers'
      - '_redirects'
      # Public folders — keep this set IDENTICAL to DIRS in scripts/build.sh.
      # A folder in DIRS but missing here ships stale (no deploy fires on edit);
      # a folder here but not in DIRS deploys as a soft-200 homepage fallback.
      - '.well-known/**'
      - 'about/**'
      - 'agencies/**'
      - 'atlas-preview/**'
      - 'blog/**'
      - 'case-studies/**'
      - 'claims/**'
      - 'example-engagement/**'
      - 'faq/**'
      - 'first-30-days/**'
      - 'first-look/**'
      - 'for-agencies/**'
      - 'kit/**'
      - 'methodology/**'
      - 'pitch/**'
      - 'principles/**'
      - 'privacy/**'
      - 'profile/**'
      - 'retraction/**'
      - 'schemas/**'
      - 'security/**'
      - 'standards/**'
      - 'state-of-aeo/**'
      - 'takedowns/**'
      - 'teardowns/**'
      - 'terms/**'
      - 'thanks/**'
      - 'vs/**'
      - 'austin-cpa-aeo/**'
      - 'hawaii-bank-aeo/**'
      - 'hawaii-cpa-aeo/**'
      - 'hawaii-law-aeo/**'
      - 'hawaii-wealth-aeo/**'
      - 'honolulu-dental-aeo/**'
      - 'directories/**'
      - 'results/**'
      - 'schema-library/**'
      - 'templates/**'
      # Build + config
      - 'wrangler.jsonc'
      - 'scripts/build.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Build dist/
        run: bash scripts/build.sh

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4 deploy
